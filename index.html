<!DOCTYPE html>
<html lang="en" data-theme="dark">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeBound – Smart Daily Task Tracker</title>

  </body>
